<div class="user-table-container">
  <table mat-table [dataSource]="users">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Login </th>
      <td mat-cell *matCellDef="let user"> {{user.login}} </td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef> Role </th>
      <td mat-cell *matCellDef="let user"> {{'User'}} </td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th class="action-user-table-col" mat-header-cell *matHeaderCellDef> </th>

      <td mat-cell *matCellDef="let user">
        <div class="action-user-buttons-container">
          <button mat-flat-button color="primary" (click)="editUser(user)">
            Edit
          </button>

          <button mat-flat-button color="warn" (click)="removeUser(user)">
            Remove
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name', 'role', 'action']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name', 'role', 'action'];"></tr>

  </table>
</div>
